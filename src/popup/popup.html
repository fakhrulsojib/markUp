<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarkUp</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Header -->
  <header id="markup-popup-header">
    <div class="markup-popup-logo">
      <img src="../icons/icon-32.png" alt="MarkUp icon" width="24" height="24">
      <h1>MarkUp</h1>
    </div>
    <span class="markup-popup-version">v0.1.0</span>
  </header>

  <!-- Theme Quick Switch -->
  <section id="markup-popup-theme" class="markup-popup-section">
    <h2>Theme</h2>
    <div class="markup-popup-theme-buttons">
      <button id="markup-theme-light" class="markup-theme-btn" data-theme="light" title="Light theme">
        <span class="markup-theme-icon">☀️</span>
        <span class="markup-theme-label">Light</span>
      </button>
      <button id="markup-theme-dark" class="markup-theme-btn" data-theme="dark" title="Dark theme">
        <span class="markup-theme-icon">🌙</span>
        <span class="markup-theme-label">Dark</span>
      </button>
      <button id="markup-theme-sepia" class="markup-theme-btn" data-theme="sepia" title="Sepia theme">
        <span class="markup-theme-icon">📜</span>
        <span class="markup-theme-label">Sepia</span>
      </button>
    </div>
  </section>

  <!-- Intercept Notification -->
  <div id="markup-popup-intercept-notice" class="markup-popup-notice hidden"></div>

  <!-- Toggles -->
  <section id="markup-popup-toggles" class="markup-popup-section">
    <div class="markup-popup-toggle-row">
      <label for="markup-toggle-enabled">Enable MarkUp</label>
      <input type="checkbox" id="markup-toggle-enabled" class="markup-toggle">
    </div>
    <div class="markup-popup-toggle-row">
      <label for="markup-toggle-intercept">Render downloads</label>
      <input type="checkbox" id="markup-toggle-intercept" class="markup-toggle">
    </div>
  </section>

  <!-- Recent Files -->
  <section id="markup-popup-recent" class="markup-popup-section">
    <h2>Recent Files</h2>
    <ul id="markup-recent-list" class="markup-popup-recent-list">
      <li class="markup-recent-empty">No recent files</li>
    </ul>
  </section>

  <!-- Footer -->
  <footer id="markup-popup-footer">
    <a href="#" id="markup-open-options" title="Open full settings page">⚙️ Options</a>
  </footer>

  <!-- Scripts: constants + StorageManager + MessageBus must load first -->
  <script src="../utils/constants.js"></script>
  <script src="../utils/logger.js"></script>
  <script src="../core/StorageManager.js"></script>
  <script src="../core/MessageBus.js"></script>
  <script src="popup.js"></script>
</body>
</html>
