<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarkUp — Options</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div id="markup-options-container">
    <!-- Header -->
    <header id="markup-options-header">
      <div class="markup-options-logo">
        <img src="../icons/icon-48.png" alt="MarkUp icon" width="32" height="32">
        <div>
          <h1>MarkUp Options</h1>
          <p class="markup-options-subtitle">Configure your Markdown reading experience</p>
        </div>
      </div>
    </header>

    <!-- Status bar (save feedback) -->
    <div id="markup-options-status" class="markup-options-status hidden">
      <span>✓ Settings saved</span>
    </div>

    <!-- Appearance Section -->
    <section id="markup-options-appearance" class="markup-options-section">
      <h2>🎨 Appearance</h2>

      <div class="markup-options-field">
        <label for="markup-opt-theme">Theme</label>
        <select id="markup-opt-theme" class="markup-options-select">
          <option value="light">Light</option>
          <option value="dark">Dark</option>
          <option value="sepia">Sepia</option>
        </select>
      </div>

      <div class="markup-options-field">
        <label for="markup-opt-fontsize">Font Size: <span id="markup-opt-fontsize-value">16</span>px</label>
        <input type="range" id="markup-opt-fontsize" class="markup-options-range" min="12" max="24" step="1" value="16">
      </div>

      <div class="markup-options-field">
        <label for="markup-opt-lineheight">Line Height: <span id="markup-opt-lineheight-value">1.6</span></label>
        <input type="range" id="markup-opt-lineheight" class="markup-options-range" min="1.2" max="2.0" step="0.1" value="1.6">
      </div>

      <div class="markup-options-field">
        <label for="markup-opt-fontfamily">Font Family</label>
        <select id="markup-opt-fontfamily" class="markup-options-select">
          <option value="system-ui">System Default</option>
          <option value="serif">Serif</option>
          <option value="sans-serif">Sans-Serif</option>
          <option value="monospace">Monospace</option>
        </select>
      </div>
    </section>

    <!-- Behavior Section -->
    <section id="markup-options-behavior" class="markup-options-section">
      <h2>⚙️ Behavior</h2>

      <div class="markup-options-field markup-options-toggle-field">
        <label for="markup-opt-autorender">Auto-render Markdown files</label>
        <input type="checkbox" id="markup-opt-autorender" class="markup-options-toggle" checked>
      </div>

      <div class="markup-options-field">
        <label for="markup-opt-extensions">File Extensions (comma-separated)</label>
        <input type="text" id="markup-opt-extensions" class="markup-options-input"
               value=".md, .markdown, .mdown, .mkd, .mdx"
               placeholder=".md, .markdown, .mdown">
      </div>
    </section>

    <!-- Advanced Section -->
    <section id="markup-options-advanced" class="markup-options-section">
      <h2>🔧 Advanced</h2>

      <div class="markup-options-field markup-options-toggle-field">
        <label for="markup-opt-csp-strict">Strict CSP Mode</label>
        <input type="checkbox" id="markup-opt-csp-strict" class="markup-options-toggle" checked>
      </div>

      <div class="markup-options-field markup-options-toggle-field">
        <label for="markup-opt-debug">Debug Logging</label>
        <input type="checkbox" id="markup-opt-debug" class="markup-options-toggle">
      </div>
    </section>

    <!-- About Section -->
    <section id="markup-options-about" class="markup-options-section">
      <h2>ℹ️ About</h2>

      <div class="markup-about-info">
        <div class="markup-about-row">
          <span class="markup-about-label">Version</span>
          <span class="markup-about-value">0.1.0</span>
        </div>
        <div class="markup-about-row">
          <span class="markup-about-label">Manifest</span>
          <span class="markup-about-value">V3</span>
        </div>
        <div class="markup-about-row">
          <span class="markup-about-label">Parser</span>
          <span class="markup-about-value">marked v15.0.12</span>
        </div>
        <div class="markup-about-row">
          <span class="markup-about-label">Highlighter</span>
          <span class="markup-about-value">highlight.js v11.11.1</span>
        </div>
      </div>

      <p class="markup-about-credits">
        Built with ❤️ — Render Markdown files beautifully in your browser.
      </p>
    </section>

    <!-- Reset Button -->
    <footer id="markup-options-footer">
      <button id="markup-opt-reset" class="markup-options-reset-btn" title="Reset all settings to defaults">
        Reset to Defaults
      </button>
    </footer>
  </div>

  <!-- Scripts -->
  <script src="../utils/constants.js"></script>
  <script src="../core/StorageManager.js"></script>
  <script src="../core/MessageBus.js"></script>
  <script src="options.js"></script>
</body>
</html>
