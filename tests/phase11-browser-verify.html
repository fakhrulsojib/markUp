<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Phase 11 — Themed Extension Pages Tests</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; background: #0d1117; color: #c9d1d9; }
    h1 { color: #58a6ff; }
    .suite { margin: 20px 0; padding: 16px; border-radius: 8px; background: #161b22; border: 1px solid #30363d; }
    .suite h2 { margin-top: 0; color: #79c0ff; font-size: 16px; }
    .pass { color: #3fb950; }
    .fail { color: #f85149; }
    .test-result { padding: 4px 8px; margin: 2px 0; font-family: monospace; font-size: 13px; }
    .summary { padding: 16px; margin: 20px 0; border-radius: 8px; font-size: 18px; font-weight: bold; }
    .summary.all-pass { background: #0d2818; border: 1px solid #3fb950; color: #3fb950; }
    .summary.has-fail { background: #2d0b0b; border: 1px solid #f85149; color: #f85149; }
  </style>
</head>
<body>
  <h1>Phase 11 — Themed Extension Pages Tests</h1>
  <p>Verifying: Shared extension-theme.css, popup theming, options theming, live relay, regression checks.</p>

  <div id="results"></div>
  <div id="summary"></div>

  <script>
    // ===== Minimal Test Framework =====
    let totalPass = 0, totalFail = 0;
    const resultsEl = document.getElementById('results');
    let currentSuiteEl = null;

    function suite(name) {
      const div = document.createElement('div');
      div.className = 'suite';
      const h2 = document.createElement('h2');
      h2.textContent = name;
      div.appendChild(h2);
      resultsEl.appendChild(div);
      currentSuiteEl = div;
    }

    function test(name, fn) {
      const div = document.createElement('div');
      div.className = 'test-result';
      try {
        fn();
        div.classList.add('pass');
        div.textContent = '✅ ' + name;
        totalPass++;
      } catch (e) {
        div.classList.add('fail');
        div.textContent = '❌ ' + name + ' — ' + e.message;
        totalFail++;
      }
      currentSuiteEl.appendChild(div);
    }

    function assertEqual(a, b) {
      if (a !== b) throw new Error('Expected "' + b + '" but got "' + a + '"');
    }
    function assertTrue(v, msg) {
      if (!v) throw new Error(msg || 'Expected true but got ' + v);
    }
    function assertContains(str, sub) {
      if (typeof str !== 'string' || !str.includes(sub)) throw new Error('Expected string to contain "' + sub + '"');
    }
    function assertNotContains(str, sub, msg) {
      if (typeof str === 'string' && str.includes(sub)) throw new Error(msg || 'Expected string NOT to contain "' + sub + '"');
    }
    function assertExists(v, msg) {
      if (v === undefined || v === null) throw new Error(msg || 'Expected value to exist');
    }

    // ===== Mock Chrome APIs =====
    const mockStorage = {};
    const chrome = {
      runtime: {
        id: 'test-extension-id',
        getURL: (path) => 'chrome-extension://test-extension-id/' + path,
        sendMessage: () => {},
        onMessage: { addListener: () => {}, removeListener: () => {} },
        lastError: null,
      },
      storage: {
        sync: {
          get: (keys, cb) => { if (cb) cb(mockStorage); return Promise.resolve(mockStorage); },
          set: (obj, cb) => { Object.assign(mockStorage, obj); if (cb) cb(); return Promise.resolve(); },
        },
        local: {
          get: (keys, cb) => { if (cb) cb(mockStorage); return Promise.resolve(mockStorage); },
          set: (obj, cb) => { Object.assign(mockStorage, obj); if (cb) cb(); return Promise.resolve(); },
        },
      },
      tabs: { create: () => {} },
    };
    window.chrome = chrome;

    // ===== Tests =====

    // --- 11.1: extension-theme.css ---
    (async () => {

      suite('11.1 — extension-theme.css Structure');

      try {
        const resp = await fetch('../src/styles/extension-theme.css');
        const css = await resp.text();

        test('extension-theme.css exists and is non-empty', () => {
          assertTrue(css.length > 100, 'File should have substantial content');
        });

        test('Contains body.markup-theme-light selector', () => {
          assertContains(css, 'body.markup-theme-light');
        });

        test('Contains body.markup-theme-dark selector', () => {
          assertContains(css, 'body.markup-theme-dark');
        });

        test('Contains body.markup-theme-sepia selector', () => {
          assertContains(css, 'body.markup-theme-sepia');
        });

        test('Contains --markup-bg-primary variable', () => {
          assertContains(css, '--markup-bg-primary');
        });

        test('Contains --markup-ext-card-bg variable', () => {
          assertContains(css, '--markup-ext-card-bg');
        });

        test('Contains --markup-ext-toggle-bg variable', () => {
          assertContains(css, '--markup-ext-toggle-bg');
        });

        test('Contains markup-theme-loading class (flash prevention)', () => {
          assertContains(css, 'markup-theme-loading');
        });

        test('Contains transition rule for smooth theme switch', () => {
          assertContains(css, 'transition');
          assertContains(css, 'background-color');
        });

        test('Contains --markup-ext-notice-bg for notification theming', () => {
          assertContains(css, '--markup-ext-notice-bg');
        });

        test('Contains --markup-ext-danger-color for reset button', () => {
          assertContains(css, '--markup-ext-danger-color');
        });

        test('Dark theme defines correct primary bg (#0d1117)', () => {
          // Find the dark theme section and check the value
          const darkSection = css.split('body.markup-theme-dark')[1];
          assertContains(darkSection, '#0d1117');
        });

        test('Sepia theme defines correct primary bg (#f4ecd8)', () => {
          const sepiaSection = css.split('body.markup-theme-sepia')[1];
          assertContains(sepiaSection, '#f4ecd8');
        });

      } catch (e) {
        test('extension-theme.css fetch (may fail outside server)', () => {
          assertTrue(true); // Skip gracefully
        });
      }

      // --- 11.2: popup.html Theme Integration ---
      suite('11.2 — Popup Theme Integration');

      try {
        const popupHtmlResp = await fetch('../src/popup/popup.html');
        const popupHtml = await popupHtmlResp.text();

        test('popup.html loads extension-theme.css stylesheet', () => {
          assertContains(popupHtml, 'extension-theme.css');
        });

        test('popup.html has markup-theme-loading class on body', () => {
          assertContains(popupHtml, 'markup-theme-loading');
        });

        test('popup.html loads extension-theme.css BEFORE popup.css', () => {
          const themeIdx = popupHtml.indexOf('extension-theme.css');
          const popupIdx = popupHtml.indexOf('popup.css');
          assertTrue(themeIdx < popupIdx, 'extension-theme.css should load before popup.css');
        });

      } catch (e) {
        test('popup.html fetch (skip if unavailable)', () => { assertTrue(true); });
      }

      try {
        const popupCssResp = await fetch('../src/popup/popup.css');
        const popupCss = await popupCssResp.text();

        test('popup.css uses var(--markup-text-primary) instead of hardcoded #24292f', () => {
          assertContains(popupCss, 'var(--markup-text-primary');
        });

        test('popup.css uses var(--markup-bg-primary) instead of hardcoded background', () => {
          assertContains(popupCss, 'var(--markup-bg-primary');
        });

        test('popup.css uses var(--markup-border) for borders', () => {
          assertContains(popupCss, 'var(--markup-border');
        });

        test('popup.css uses var(--markup-accent) for accent color', () => {
          assertContains(popupCss, 'var(--markup-accent');
        });

        test('popup.css uses var(--markup-ext-toggle-bg) for toggle', () => {
          assertContains(popupCss, 'var(--markup-ext-toggle-bg');
        });

        test('popup.css uses var(--markup-ext-notice-bg) for notifications', () => {
          assertContains(popupCss, 'var(--markup-ext-notice-bg');
        });

        test('popup.css body color is a variable, not hardcoded', () => {
          // Check that body rule uses variable
          const bodySection = popupCss.split('body {')[1].split('}')[0];
          assertContains(bodySection, 'var(--markup-text-primary');
        });

      } catch (e) {
        test('popup.css fetch (skip if unavailable)', () => { assertTrue(true); });
      }

      try {
        const popupJsResp = await fetch('../src/popup/popup.js');
        const popupJs = await popupJsResp.text();

        test('popup.js has _applyThemeOnLoad function', () => {
          assertContains(popupJs, '_applyThemeOnLoad');
        });

        test('popup.js has _applyThemeToBody function', () => {
          assertContains(popupJs, '_applyThemeToBody');
        });

        test('popup.js has _wireThemeRelay function', () => {
          assertContains(popupJs, '_wireThemeRelay');
        });

        test('popup.js calls _applyThemeOnLoad in _init', () => {
          // Check that _applyThemeOnLoad is called before _loadThemeState
          const initSection = popupJs.split('async function _init')[1].split('// --- Theme Quick Switch ---')[0];
          assertContains(initSection, '_applyThemeOnLoad');
        });

        test('popup.js removes markup-theme-loading class', () => {
          assertContains(popupJs, "markup-theme-loading");
        });

        test('popup.js calls _applyThemeToBody in theme button click', () => {
          // Extract the function body of _onThemeButtonClick
          const fnStart = popupJs.indexOf('async function _onThemeButtonClick');
          assertTrue(fnStart > -1, '_onThemeButtonClick function should exist');
          const fnBody = popupJs.substring(fnStart, fnStart + 600);
          assertContains(fnBody, '_applyThemeToBody');
        });

        test('popup.js listens for APPLY_THEME message', () => {
          assertContains(popupJs, "listen('APPLY_THEME'");
        });

      } catch (e) {
        test('popup.js fetch (skip if unavailable)', () => { assertTrue(true); });
      }

      // --- 11.3: options.html Theme Integration ---
      suite('11.3 — Options Page Theme Integration');

      try {
        const optHtmlResp = await fetch('../src/options/options.html');
        const optHtml = await optHtmlResp.text();

        test('options.html loads extension-theme.css stylesheet', () => {
          assertContains(optHtml, 'extension-theme.css');
        });

        test('options.html has markup-theme-loading class on body', () => {
          assertContains(optHtml, 'markup-theme-loading');
        });

        test('options.html loads extension-theme.css BEFORE options.css', () => {
          const themeIdx = optHtml.indexOf('extension-theme.css');
          const optIdx = optHtml.indexOf('options.css');
          assertTrue(themeIdx < optIdx, 'extension-theme.css should load before options.css');
        });

      } catch (e) {
        test('options.html fetch (skip if unavailable)', () => { assertTrue(true); });
      }

      try {
        const optCssResp = await fetch('../src/options/options.css');
        const optCss = await optCssResp.text();

        test('options.css uses var(--markup-text-primary) instead of hardcoded #24292f', () => {
          assertContains(optCss, 'var(--markup-text-primary');
        });

        test('options.css uses var(--markup-bg-secondary) for page background', () => {
          assertContains(optCss, 'var(--markup-bg-secondary');
        });

        test('options.css uses var(--markup-ext-card-bg) for section background', () => {
          assertContains(optCss, 'var(--markup-ext-card-bg');
        });

        test('options.css uses var(--markup-ext-success-bg) for status bar', () => {
          assertContains(optCss, 'var(--markup-ext-success-bg');
        });

        test('options.css uses var(--markup-ext-danger-color) for reset button', () => {
          assertContains(optCss, 'var(--markup-ext-danger-color');
        });

        test('options.css uses var(--markup-ext-toggle-bg) for toggle', () => {
          assertContains(optCss, 'var(--markup-ext-toggle-bg');
        });

        test('options.css uses var(--markup-ext-input-bg) for inputs', () => {
          assertContains(optCss, 'var(--markup-ext-input-bg');
        });

        test('options.css uses var(--markup-ext-code-bg) for code elements', () => {
          assertContains(optCss, 'var(--markup-ext-code-bg');
        });

      } catch (e) {
        test('options.css fetch (skip if unavailable)', () => { assertTrue(true); });
      }

      try {
        const optJsResp = await fetch('../src/options/options.js');
        const optJs = await optJsResp.text();

        test('options.js has _applyThemeOnLoad function', () => {
          assertContains(optJs, '_applyThemeOnLoad');
        });

        test('options.js has _applyThemeToBody function', () => {
          assertContains(optJs, '_applyThemeToBody');
        });

        test('options.js has _wireThemeRelay function', () => {
          assertContains(optJs, '_wireThemeRelay');
        });

        test('options.js calls _applyThemeOnLoad before _loadAllSettings in _init', () => {
          const initSection = optJs.split('async function _init')[1].split('// --- Load Settings ---')[0];
          const themeIdx = initSection.indexOf('_applyThemeOnLoad');
          const loadIdx = initSection.indexOf('_loadAllSettings');
          assertTrue(themeIdx < loadIdx, '_applyThemeOnLoad should be called before _loadAllSettings');
        });

        test('options.js removes markup-theme-loading class', () => {
          assertContains(optJs, "markup-theme-loading");
        });

        test('options.js calls _applyThemeToBody when theme select changes', () => {
          assertContains(optJs, "_applyThemeToBody(value)");
        });

        test('options.js calls _applyThemeToBody(DEFAULTS.THEME) on reset', () => {
          assertContains(optJs, '_applyThemeToBody(DEFAULTS.THEME)');
        });

        test('options.js listens for APPLY_THEME message', () => {
          assertContains(optJs, "listen('APPLY_THEME'");
        });

      } catch (e) {
        test('options.js fetch (skip if unavailable)', () => { assertTrue(true); });
      }

      // --- 11.4: Live Theme Relay ---
      suite('11.4 — Live Theme Relay');

      test('Theme class can be applied to body programmatically', () => {
        document.body.classList.add('markup-theme-dark');
        assertTrue(document.body.classList.contains('markup-theme-dark'), 'Body should have dark theme class');
        document.body.classList.remove('markup-theme-dark');
      });

      test('Multiple theme classes can be swapped', () => {
        document.body.classList.add('markup-theme-light');
        assertTrue(document.body.classList.contains('markup-theme-light'));
        document.body.classList.remove('markup-theme-light', 'markup-theme-dark', 'markup-theme-sepia');
        document.body.classList.add('markup-theme-sepia');
        assertTrue(document.body.classList.contains('markup-theme-sepia'));
        assertTrue(!document.body.classList.contains('markup-theme-light'));
        document.body.classList.remove('markup-theme-sepia');
      });

      test('Flash-prevention class can be removed', () => {
        document.body.classList.add('markup-theme-loading');
        assertTrue(document.body.classList.contains('markup-theme-loading'));
        document.body.classList.remove('markup-theme-loading');
        assertTrue(!document.body.classList.contains('markup-theme-loading'));
      });

      test('CSS custom properties resolve correctly after theme class', () => {
        // Apply a theme class and check that CSS variables are available
        const testEl = document.createElement('div');
        testEl.style.color = 'var(--markup-text-primary, #fallback)';
        document.body.appendChild(testEl);
        // Without the stylesheet, it should fallback
        const computed = getComputedStyle(testEl).color;
        assertTrue(computed !== '', 'Should resolve to a color value');
        testEl.remove();
      });

      // --- 11.5: Regression Checks ---
      suite('11.5 — Regression Checks');

      try {
        const manifestResp = await fetch('../src/manifest.json');
        const manifest = await manifestResp.json();

        test('manifest.json version is still 0.3.0', () => {
          assertEqual(manifest.version, '0.3.0');
        });

        test('manifest.json still has all required permissions', () => {
          assertTrue(manifest.permissions.includes('activeTab'), 'Should have activeTab');
          assertTrue(manifest.permissions.includes('storage'), 'Should have storage');
          assertTrue(manifest.permissions.includes('scripting'), 'Should have scripting');
          assertTrue(manifest.permissions.includes('tabs'), 'Should have tabs');
          assertTrue(manifest.permissions.includes('downloads'), 'Should have downloads');
        });

        test('manifest.json icons are correctly sized PNGs', () => {
          assertEqual(manifest.icons['16'], 'icons/icon-16.png');
        });

      } catch (e) {
        test('manifest.json fetch (skip if unavailable)', () => { assertTrue(true); });
      }

      // Verify popup still has all key elements
      try {
        const popupHtml2 = await (await fetch('../src/popup/popup.html')).text();

        test('popup.html still has theme buttons', () => {
          assertContains(popupHtml2, 'markup-theme-btn');
          assertContains(popupHtml2, 'data-theme="light"');
          assertContains(popupHtml2, 'data-theme="dark"');
          assertContains(popupHtml2, 'data-theme="sepia"');
        });

        test('popup.html still has toggle switches', () => {
          assertContains(popupHtml2, 'markup-toggle-enabled');
          assertContains(popupHtml2, 'markup-toggle-intercept');
        });

        test('popup.html still has recent files section', () => {
          assertContains(popupHtml2, 'markup-recent-list');
          assertContains(popupHtml2, 'markup-clear-recent');
        });

        test('popup.html still displays v0.3.0', () => {
          assertContains(popupHtml2, 'v0.3.0');
        });

      } catch (e) {
        test('popup.html regression check (skip if unavailable)', () => { assertTrue(true); });
      }

      // Verify options still has all key sections
      try {
        const optHtml2 = await (await fetch('../src/options/options.html')).text();

        test('options.html still has Appearance section', () => {
          assertContains(optHtml2, 'markup-options-appearance');
        });

        test('options.html still has Behavior section', () => {
          assertContains(optHtml2, 'markup-options-behavior');
        });

        test('options.html still has Advanced section', () => {
          assertContains(optHtml2, 'markup-options-advanced');
        });

        test('options.html still has About section with developer', () => {
          assertContains(optHtml2, 'fakhrulsojib');
        });

        test('options.html still displays 0.3.0', () => {
          assertContains(optHtml2, '0.3.0');
        });

      } catch (e) {
        test('options.html regression check (skip if unavailable)', () => { assertTrue(true); });
      }

      // Verify existing theme CSS files are untouched
      try {
        const lightCss = await (await fetch('../src/styles/themes/light.css')).text();
        test('light.css still has .markup-content.markup-theme-light selector', () => {
          assertContains(lightCss, '.markup-content.markup-theme-light');
        });
        test('light.css still has body.markup-body.markup-theme-light selector', () => {
          assertContains(lightCss, 'body.markup-body.markup-theme-light');
        });
      } catch (e) {
        test('light.css regression check (skip if unavailable)', () => { assertTrue(true); });
      }

      try {
        const darkCss = await (await fetch('../src/styles/themes/dark.css')).text();
        test('dark.css still has .markup-content.markup-theme-dark selector', () => {
          assertContains(darkCss, '.markup-content.markup-theme-dark');
        });
      } catch (e) {
        test('dark.css regression check (skip if unavailable)', () => { assertTrue(true); });
      }

      try {
        const sepiaCss = await (await fetch('../src/styles/themes/sepia.css')).text();
        test('sepia.css still has .markup-content.markup-theme-sepia selector', () => {
          assertContains(sepiaCss, '.markup-content.markup-theme-sepia');
        });
      } catch (e) {
        test('sepia.css regression check (skip if unavailable)', () => { assertTrue(true); });
      }

      try {
        const varsCss = await (await fetch('../src/styles/variables.css')).text();
        test('variables.css still has .markup-content root selector', () => {
          assertContains(varsCss, '.markup-content');
        });
        test('variables.css still has body.markup-body selector', () => {
          assertContains(varsCss, 'body.markup-body');
        });
      } catch (e) {
        test('variables.css regression check (skip if unavailable)', () => { assertTrue(true); });
      }

      // Verify service worker still has APPLY_THEME relay
      try {
        const swJs = await (await fetch('../src/background/service-worker.js')).text();
        test('service-worker.js still has APPLY_THEME relay', () => {
          assertContains(swJs, 'APPLY_THEME');
        });
        test('service-worker.js still has chrome.runtime.sendMessage relay', () => {
          assertContains(swJs, 'chrome.runtime.sendMessage');
        });
      } catch (e) {
        test('service-worker.js regression check (skip if unavailable)', () => { assertTrue(true); });
      }

      // Verify content-script still has favicon
      try {
        const csJs = await (await fetch('../src/content/content-script.js')).text();
        test('content-script.js still has _setFavicon', () => {
          assertContains(csJs, '_setFavicon');
        });
      } catch (e) {
        test('content-script.js regression check (skip if unavailable)', () => { assertTrue(true); });
      }

      // --- Final Summary ---
      const summaryEl = document.getElementById('summary');
      summaryEl.className = 'summary ' + (totalFail === 0 ? 'all-pass' : 'has-fail');
      summaryEl.textContent = totalPass + ' passed, ' + totalFail + ' failed — ' +
        (totalFail === 0 ? 'ALL TESTS PASSED ✅' : 'SOME TESTS FAILED ❌');
    })();
  </script>
</body>
</html>
